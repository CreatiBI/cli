name: Feature Request
description: 提出新功能需求或改进建议
title: "[Feature] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您的建议！请详细描述您的需求，帮助我们评估和规划新功能。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 您希望新增或改进什么功能？请尽可能清晰地描述。
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: 使用场景 / 业务需求
      description: |
        为什么需要这个功能？它解决了什么问题？
        请描述实际的使用场景，这有助于我们理解需求的价值。
    validations:
      required: true

  - type: textarea
    id: cli_design
    attributes:
      label: 期望的命令 / 参数设计
      description: |
        如果您对 CLI 的命令和参数有具体建议，请在此描述。
        参考现有命令风格：`cbi <module> <action> [flags]`
      placeholder: |
        例如：
        cbi portfolio create --name "Q3投放" --description "第三季度投放素材集"

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您是否考虑过其他替代方案？目前的 cbi 命令是否可以部分满足需求？

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 任何有助于评估此需求的额外信息（相关文档链接、竞品参考等）