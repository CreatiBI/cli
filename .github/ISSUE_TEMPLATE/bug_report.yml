name: Bug Report
description: 报告 cbi CLI 的缺陷或异常行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您报告 Bug！请尽可能详细地填写以下信息，以便我们快速定位和修复问题。

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      description: 您运行 cbi 的操作系统
      options:
        - macOS (Apple Silicon / arm64)
        - macOS (Intel / amd64)
        - Linux (amd64)
        - Linux (arm64)
        - Windows (amd64)
        - Windows (arm64)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: cbi 版本
      description: 请运行 `cbi --version` 获取版本号
      placeholder: "例如：0.1.34"
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: 执行的命令
      description: 触发 Bug 的完整命令（包含所有参数）
      placeholder: "例如：cbi repository list --format json"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 您期望命令执行后应该发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 命令实际执行后发生了什么（包括错误现象）
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 错误输出 / 日志
      description: |
        请粘贴完整的错误输出。如无明显错误信息，请使用 `--verbose` 参数重新运行命令并粘贴输出。
      render: shell

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按步骤描述如何触发此 Bug
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 任何有助于定位问题的额外信息（配置文件内容、网络环境、截图等）